<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">SampleDisc workflow overview</title>
  <desc id="desc">A simple three-stage workflow from single-cell profiles to pseudobulk signatures to sample-level downstream analysis.</desc>
  <rect width="960" height="300" fill="#f8fbff" rx="24" />
  <rect x="40" y="70" width="230" height="160" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" />
  <rect x="365" y="70" width="230" height="160" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="2" />
  <rect x="690" y="70" width="230" height="160" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2" />
  <text x="155" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Single-cell inputs</text>
  <text x="155" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">scRNA-seq</text>
  <text x="155" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">scATAC-seq</text>
  <text x="155" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">paired or unpaired cohorts</text>
  <text x="480" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Sample representation</text>
  <text x="480" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">cell-type pseudobulk profiles</text>
  <text x="480" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">composition signatures</text>
  <text x="480" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">cross-modality concordance</text>
  <text x="805" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Downstream analysis</text>
  <text x="805" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">sample distance</text>
  <text x="805" y="168" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">trajectory and clustering</text>
  <text x="805" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0f172a">differential testing</text>
  <path d="M270 150 L350 150" stroke="#0284c7" stroke-width="5" marker-end="url(#arrow)" />
  <path d="M595 150 L675 150" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow)" />
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L7,3 z" fill="#0f172a" />
    </marker>
  </defs>
</svg>
