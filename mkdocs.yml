site_name: SampleDisc Docs v0.2
site_description: Documentation for SampleDisc, a pipeline for sample-level representation learning from single-cell multi-omics data.
use_directory_urls: true
strict: false

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
      - "Configuration Guide": tutorials/config_guide.md
      - "RNA Pipeline": tutorials/tutorial_rna.md
      - "ATAC Pipeline": tutorials/tutorial_atac.md
      - "Multi-omics Pipeline": tutorials/tutorial_multiomics.md
      - "Downstream Analysis": tutorials/tutorial_downstream.md
  - API Reference:
      - RNA: api/rna.md
      - ATAC: api/atac.md
      - Multi-omics: api/multiomics.md
      - Downstream: api/downstream.md
