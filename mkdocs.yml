site_name: SampleDisc
site_description: A config-driven pipeline for sample-level representation learning from single-cell RNA, ATAC, and unpaired multi-omics data.
use_directory_urls: true
strict: false

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    logo: material/dna
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
      - "Configuration guide": tutorials/configuration.md
      - "RNA pipeline": tutorials/rna.md
      - "ATAC pipeline": tutorials/atac.md
      - "Multi-omics pipeline": tutorials/multiomics.md
      - "Downstream analysis": tutorials/downstream.md
  - API reference:
      - Overview: api/index.md
      - RNA:
          - Overview: api/rna.md
          - preprocess_linux: api/rna/preprocess_linux.md
          - cell_types_linux: api/rna/cell_types_linux.md
      - ATAC:
          - Overview: api/atac.md
          - preprocess_linux: api/atac/preprocess_linux.md
      - Multi-omics:
          - Overview: api/multiomics.md
          - multiomics_preparation: api/multiomics/multiomics_preparation.md
          - integrate_preprocess: api/multiomics/integrate_preprocess.md
          - cell_types_multiomics_linux: api/multiomics/cell_types_multiomics_linux.md
          - calculate_multiomics_sample_embedding: api/multiomics/calculate_multiomics_sample_embedding.md
          - find_optimal_cell_resolution_multiomics_linux: api/multiomics/find_optimal_cell_resolution_multiomics_linux.md
          - replace_optimal_dimension_reduction: api/multiomics/replace_optimal_dimension_reduction.md
      - Shared:
          - calculate_sample_embedding: api/shared/calculate_sample_embedding.md
          - find_optimal_cell_resolution_linux: api/shared/find_optimal_cell_resolution_linux.md
      - Downstream:
          - Overview: api/downstream.md
          - sample_distance: api/downstream/sample_distance.md
          - CCA_Call: api/downstream/trajectory_cca_call.md
          - cca_pvalue_test: api/downstream/trajectory_cca_pvalue_test.md
          - TSCAN: api/downstream/trajectory_tscan.md
          - run_trajectory_gam_differential_gene_analysis: api/downstream/trajectory_gam_dge.md
          - cluster: api/downstream/cluster.md
          - proportion_test: api/downstream/proportion_test.md
          - raisinfit: api/downstream/raisinfit.md
          - run_pairwise_tests: api/downstream/run_pairwise_tests.md
          - visualization: api/downstream/visualization.md
          - visualize_multimodal_embedding: api/downstream/visualize_multimodal_embedding.md
