site_name: SampleDisc Docs v0.2
site_description: Documentation for SampleDisc, a pipeline for sample-level representation learning from single-cell multi-omics data.
use_directory_urls: true
strict: false

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Installation: installation.md
  - Tutorials:
      - "Configuration Guide": tutorials/config_guide.md
      - "RNA Pipeline": tutorials/tutorial_rna.md
      - "ATAC Pipeline": tutorials/tutorial_atac.md
      - "Multi-omics Pipeline": tutorials/tutorial_multiomics.md
      - "Downstream Analysis": tutorials/tutorial_downstream.md
  - API Reference:
      - Overview: api/index.md
      - RNA:
          - Overview: api/rna.md
          - preprocess_linux: api/rna/preprocess_linux.md
          - cell_types_linux: api/rna/cell_types_linux.md
          - calculate_sample_embedding: api/shared/calculate_sample_embedding.md
          - find_optimal_cell_resolution_linux: api/shared/find_optimal_cell_resolution_linux.md
      - ATAC:
          - Overview: api/atac.md
          - preprocess_linux: api/atac/preprocess_linux.md
          - cell_types_linux: api/rna/cell_types_linux.md
          - calculate_sample_embedding: api/shared/calculate_sample_embedding.md
          - find_optimal_cell_resolution_linux: api/shared/find_optimal_cell_resolution_linux.md
      - Multi-omics:
          - Overview: api/multiomics.md
          - multiomics_preparation: api/multiomics/multiomics_preparation.md
          - integrate_preprocess: api/multiomics/integrate_preprocess.md
          - cell_types_multiomics_linux: api/multiomics/cell_types_multiomics_linux.md
          - calculate_multiomics_sample_embedding: api/multiomics/calculate_multiomics_sample_embedding.md
          - find_optimal_cell_resolution_multiomics_linux: api/multiomics/find_optimal_cell_resolution_multiomics_linux.md
          - replace_optimal_dimension_reduction: api/multiomics/replace_optimal_dimension_reduction.md
      - Downstream:
          - Overview: api/downstream.md
          - sample_distance: api/downstream/sample_distance.md
          - CCA_Call: api/downstream/trajectory_cca_call.md
          - cca_pvalue_test: api/downstream/trajectory_cca_pvalue_test.md
          - TSCAN: api/downstream/trajectory_tscan.md
          - run_trajectory_gam_differential_gene_analysis: api/downstream/trajectory_gam_dge.md
          - cluster: api/downstream/cluster.md
          - proportion_test: api/downstream/proportion_test.md
          - raisinfit: api/downstream/raisinfit.md
          - run_pairwise_tests: api/downstream/run_pairwise_tests.md
          - visualization: api/downstream/visualization.md
          - visualize_multimodal_embedding: api/downstream/visualize_multimodal_embedding.md
