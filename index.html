<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SampleDisc</title>
    <meta http-equiv="refresh" content="0; url=./site/" />
    <link rel="canonical" href="./site/" />
    <script>
      window.location.replace("./site/");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <noscript>
      <main class="notice-page">
        <section class="notice-card">
          <p class="eyebrow">SampleDisc documentation</p>
          <h1>Open the documentation</h1>
          <p>
            Your browser did not follow the automatic redirect. Click the button
            below to open the built MkDocs site.
          </p>
          <div class="actions">
            <a class="button primary" href="./site/">Open docs</a>
          </div>
        </section>
      </main>
    </noscript>
    <main class="notice-page" id="fallback" hidden>
      <section class="notice-card">
        <p class="eyebrow">SampleDisc documentation</p>
        <h1>Redirecting&hellip;</h1>
        <p>
          If you are not redirected automatically,
          <a href="./site/">open the documentation</a>.
        </p>
      </section>
    </main>
  </body>
</html>
